name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: "Dry run — validate only, skip deploy"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate — runs without environment protection so it never blocks
  #         on reviewer approval. Uses repo-level secrets per environment.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Salesforce Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Salesforce CLI
        run: |
          set -euo pipefail
          npm install --global @salesforce/cli
          sf --version

      - name: Check metadata root exists
        id: check-metadata
        run: |
          set -euo pipefail
          if [ ! -d "force-app" ]; then
            echo "::warning title=No metadata root::force-app directory not found. Skipping validate."
            echo "has_metadata=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_metadata=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when no metadata
        if: steps.check-metadata.outputs.has_metadata != 'true'
        run: |
          echo "force-app not found — nothing to validate."
          mkdir -p .artifacts/deploy-validate

      - name: Ensure Salesforce auth secret is configured
        if: steps.check-metadata.outputs.has_metadata == 'true'
        env:
          # Repo-level secrets: SF_AUTH_URL_STAGING and SF_AUTH_URL_PRODUCTION
          # These allow validate to run without requiring environment approval.
          SF_AUTH_URL: ${{ inputs.environment == 'production' && secrets.SF_AUTH_URL_PRODUCTION || secrets.SF_AUTH_URL_STAGING }}
        run: |
          set -euo pipefail
          if [ -z "${SF_AUTH_URL:-}" ]; then
            echo "::error title=Missing auth secret::Repository secret SF_AUTH_URL_${{ inputs.environment == 'production' && 'PRODUCTION' || 'STAGING' }} is not configured. Add it in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Authenticate Salesforce org
        if: steps.check-metadata.outputs.has_metadata == 'true'
        env:
          SF_AUTH_URL: ${{ inputs.environment == 'production' && secrets.SF_AUTH_URL_PRODUCTION || secrets.SF_AUTH_URL_STAGING }}
        run: |
          set -euo pipefail

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"

          sf org login sfdx-url \
            --sfdx-url-file "$auth_file" \
            --alias deploy-validate-org \
            --set-default

      - name: Run validate-only deploy
        if: steps.check-metadata.outputs.has_metadata == 'true'
        run: |
          set -euo pipefail

          mkdir -p .artifacts/deploy-validate/results

          sf project deploy validate \
            --source-dir force-app \
            --target-org deploy-validate-org \
            --wait 30 \
            --results-dir .artifacts/deploy-validate/results \
            --verbose 2>&1 | tee .artifacts/deploy-validate/validate.log

      - name: Upload validate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-validate-${{ github.run_id }}
          path: .artifacts/deploy-validate
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Job 2: Deploy — runs inside GitHub Environment, gated by environment
  #         protection rules. Uses environment-scoped secret SF_AUTH_URL.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    environment: ${{ inputs.environment }}
    if: ${{ !inputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Salesforce CLI
        run: |
          set -euo pipefail
          npm install --global @salesforce/cli
          sf --version

      - name: Authenticate Salesforce org
        # SF_AUTH_URL is an environment-scoped secret — each GitHub Environment
        # (staging / production) stores its own value, providing credential isolation.
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SF_AUTH_URL:-}" ]; then
            echo "::error title=Missing auth secret::Environment secret SF_AUTH_URL is not set for the '${{ inputs.environment }}' environment. Add it in Settings → Environments → ${{ inputs.environment }} → Secrets."
            exit 1
          fi

          auth_file="$(mktemp)"
          trap 'rm -f "$auth_file"' EXIT
          printf '%s' "$SF_AUTH_URL" > "$auth_file"

          sf org login sfdx-url \
            --sfdx-url-file "$auth_file" \
            --alias deploy-org \
            --set-default

      - name: Deploy Salesforce metadata
        id: deploy
        run: |
          set -euo pipefail

          mkdir -p .artifacts/deploy/results

          sf project deploy start \
            --source-dir force-app \
            --target-org deploy-org \
            --wait 30 \
            --results-dir .artifacts/deploy/results \
            --verbose 2>&1 | tee .artifacts/deploy/deploy.log

      - name: Capture deploy ID
        if: always()
        id: capture-id
        run: |
          set -euo pipefail

          deploy_id=""

          # Try to extract Job ID from deploy log (format: "Deploy ID: 0Af...")
          if [ -f ".artifacts/deploy/deploy.log" ]; then
            deploy_id="$(grep -oE '(Deploy ID|Job ID)[[:space:]]*:[[:space:]]*[0-9A-Za-z]{15,18}' \
              .artifacts/deploy/deploy.log | head -1 | grep -oE '[0-9A-Za-z]{15,18}$' || true)"
          fi

          # Fallback: look inside results JSON for deployId / id field
          if [ -z "$deploy_id" ] && [ -d ".artifacts/deploy/results" ]; then
            deploy_id="$(find .artifacts/deploy/results -name '*.json' -print0 \
              | xargs -0 grep -hoE '"(deployId|id)"[[:space:]]*:[[:space:]]*"[0-9A-Za-z]{15,18}"' 2>/dev/null \
              | head -1 | grep -oE '[0-9A-Za-z]{15,18}"' | tr -d '"' || true)"
          fi

          echo "deploy_id=${deploy_id:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Deploy ID: ${deploy_id:-unknown}"

      - name: Write job summary
        if: always()
        run: |
          deploy_id="${{ steps.capture-id.outputs.deploy_id }}"
          timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          version="$(node -p "require('./package.json').version" 2>/dev/null || echo 'n/a')"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🚀 Deploy Summary

          | Field       | Value |
          |-------------|-------|
          | Environment | \`${{ inputs.environment }}\` |
          | Version     | \`${version}\` |
          | Deploy ID   | \`${deploy_id}\` |
          | Triggered   | \`${{ github.actor }}\` |
          | Commit      | \`${{ github.sha }}\` |
          | Timestamp   | \`${timestamp}\` |
          | Run         | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ### Rollback

          See **[RUNBOOK.md — Section 17: Deploy workflow и rollback](../blob/${{ github.ref_name }}/RUNBOOK.md#17-deploy-workflow-и-rollback)** for rollback procedures.

          EOF

      - name: Upload deploy artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-${{ inputs.environment }}-${{ github.run_id }}
          path: .artifacts/deploy
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Job 3: Dry-run summary — emitted when dry_run=true; deploy is skipped.
  # ---------------------------------------------------------------------------
  dry-run-summary:
    name: Dry Run Summary
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.dry_run }}
    steps:
      - name: Emit dry-run summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🧪 Dry Run — deploy skipped

          Validate completed successfully. No changes were deployed.

          | Field       | Value |
          |-------------|-------|
          | Environment | `${{ inputs.environment }}` |
          | Dry run     | `true` |

          ### To deploy for real

          Re-run this workflow from **Actions → Deploy → Run workflow** with:
          - `environment`: `${{ inputs.environment }}`
          - `dry_run`: **unchecked** (false)

          EOF

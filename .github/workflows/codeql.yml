name: CodeQL SAST

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis (JavaScript)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Built-in security-extended query suite: includes all security queries
          # (CWE-020 Input Validation, CWE-079 XSS, CWE-089 SQL Injection, etc.)
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          # Upload SARIF results to GitHub Security tab for PR annotations
          upload: true
          # Fail the job on any error-level finding (HIGH / CRITICAL severity).
          # warning-level findings are advisory and visible in the Security tab
          # but do not block merge.
          wait-for-processing: true

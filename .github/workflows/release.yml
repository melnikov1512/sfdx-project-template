name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run — preview version without committing or tagging"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump_type }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git push origin main

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.bump.outputs.version }} \
            --title "${{ steps.bump.outputs.version }}" \
            --generate-notes \
            --latest

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## 🧪 Dry Run — no changes made" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Would bump to | \`${{ steps.bump.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump type | \`${{ inputs.bump_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Re-run without dry run to publish." >> "$GITHUB_STEP_SUMMARY"

      - name: Release summary
        if: ${{ !inputs.dry_run }}
        run: |
          echo "## 🚀 Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.bump.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump type | \`${{ inputs.bump_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | https://github.com/${{ github.repository }}/releases/tag/${{ steps.bump.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
